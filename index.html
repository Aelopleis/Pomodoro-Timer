<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Pomodoro</title>
<link rel="apple-touch-icon" href="IMG_0107.jpeg">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0a;
    --circle-left: #b0b0b0;
    --circle-right: #3a3a3a;
    --text-primary: #ffffff;
    --text-on-light: #0a0a0a;
    --text-on-dark: #e0e0e0;
  }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    height: 100vh;
    width: 100vw;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .top-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  .menu-btn {
    position: absolute;
    left: 24px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 5px;
    padding: 8px;
  }
  .menu-btn span {
    display: block;
    width: 26px;
    height: 2px;
    background: var(--text-primary);
    border-radius: 2px;
  }

  .ratio-btn {
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 15px;
    font-family: inherit;
    font-weight: 300;
    letter-spacing: 0.05em;
    cursor: pointer;
    padding: 6px 12px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .ratio-btn:hover { background: rgba(255,255,255,0.08); }

  .circles-wrapper {
    position: relative;
    width: 520px;
    height: 300px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .circle {
    position: absolute;
    width: 280px;
    height: 280px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    transition: background 0.4s;
  }

  .circle-left  { left: 20px;  background: var(--circle-left);  z-index: 2; }
  .circle-right { right: 20px; background: var(--circle-right); z-index: 1; }

  .circle-number {
    font-size: 86px;
    font-weight: 200;
    line-height: 1;
    letter-spacing: -0.03em;
  }
  .circle-label {
    font-size: 15px;
    font-weight: 300;
    letter-spacing: 0.12em;
    opacity: 0.75;
  }

  .circle-left  .circle-number,
  .circle-left  .circle-label { color: var(--text-on-light); }
  .circle-right .circle-number,
  .circle-right .circle-label { color: var(--text-on-dark); }

  .status-row {
    margin-top: 48px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--circle-left);
    animation: pulse 1.5s ease-in-out infinite;
  }
  .status-dot.break  { background: var(--circle-right); animation: none; opacity: 0.5; }
  .status-dot.paused { animation: none; opacity: 0.4; }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.5; transform: scale(0.7); }
  }

  .status-text {
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    opacity: 0.55;
  }

  .action-row {
    margin-top: 28px;
    display: flex;
    gap: 16px;
  }

  .action-btn {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.12em;
    padding: 10px 28px;
    border-radius: 40px;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
  }
  .action-btn:hover { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.2); }
  .action-btn.primary {
    background: rgba(255,255,255,0.12);
    border-color: rgba(255,255,255,0.2);
  }
  .action-btn.primary:hover { background: rgba(255,255,255,0.2); }

  /* PANEL */
  .panel-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    align-items: flex-start;
    justify-content: flex-start;
  }
  .panel-overlay.open { display: flex; }

  .panel {
    background: #141414;
    width: 320px;
    height: 100vh;
    padding: 32px 28px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 28px;
    animation: slideIn 0.22s ease-out;
  }
  @keyframes slideIn {
    from { transform: translateX(-100%); }
    to   { transform: translateX(0); }
  }

  .panel h2 {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.4;
    margin-bottom: -12px;
  }

  .panel-section { display: flex; flex-direction: column; gap: 12px; }

  .panel-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .panel-label {
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.04em;
    opacity: 0.8;
    flex-shrink: 0;
  }

  .color-input-wrap { display: flex; align-items: center; gap: 8px; }

  .color-swatch {
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    cursor: pointer;
    flex-shrink: 0;
  }

  .hex-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 13px;
    padding: 6px 10px;
    border-radius: 6px;
    width: 96px;
    outline: none;
    letter-spacing: 0.05em;
    transition: border-color 0.15s;
  }
  .hex-input:focus { border-color: rgba(255,255,255,0.3); }

  .toggle-row { display: flex; align-items: center; justify-content: space-between; }

  .toggle {
    width: 44px; height: 24px;
    background: rgba(255,255,255,0.12);
    border-radius: 12px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    border: none;
    flex-shrink: 0;
  }
  .toggle.on { background: rgba(255,255,255,0.35); }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle.on::after { transform: translateX(20px); }

  .divider {
    height: 1px;
    background: rgba(255,255,255,0.07);
    margin: 0 -4px;
  }

  .close-panel-btn {
    margin-top: auto;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.1em;
    padding: 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    text-align: center;
  }
  .close-panel-btn:hover { background: rgba(255,255,255,0.1); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: #141414;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 32px 28px;
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    animation: fadeUp 0.2s ease-out;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .modal h3 {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.4;
  }

  .modal-row { display: flex; align-items: center; justify-content: space-between; }
  .modal-label { font-size: 14px; font-weight: 300; opacity: 0.7; }

  .num-input {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text-primary);
    font-family: inherit;
    font-size: 18px;
    font-weight: 200;
    width: 72px;
    text-align: center;
    padding: 8px;
    border-radius: 8px;
    outline: none;
  }
  .num-input:focus { border-color: rgba(255,255,255,0.3); }

  .modal-btns { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1;
    padding: 12px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.08em;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.05);
    color: var(--text-primary);
    transition: background 0.15s;
  }
  .modal-btn:hover { background: rgba(255,255,255,0.1); }
  .modal-btn.confirm { background: rgba(255,255,255,0.12); border-color: rgba(255,255,255,0.18); }
  .modal-btn.confirm:hover { background: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<div class="top-bar">
  <button class="menu-btn" id="menuBtn" aria-label="Ayarlar">
    <span></span><span></span><span></span>
  </button>
  <button class="ratio-btn" id="ratioBtn">80/20</button>
</div>

<div class="circles-wrapper">
  <div class="circle circle-left" id="circleLeft">
    <div class="circle-number" id="minuteDisplay">80</div>
    <div class="circle-label">dk.</div>
  </div>
  <div class="circle circle-right" id="circleRight">
    <div class="circle-number" id="secondDisplay">00</div>
    <div class="circle-label">sn.</div>
  </div>
</div>

<div class="status-row">
  <div class="status-dot paused" id="statusDot"></div>
  <div class="status-text" id="statusText">Hazır</div>
</div>

<div class="action-row">
  <button class="action-btn" id="resetBtn">Sıfırla</button>
  <button class="action-btn primary" id="startBtn">Başlat</button>
</div>

<!-- SETTINGS PANEL -->
<div class="panel-overlay" id="panelOverlay">
  <div class="panel">
    <h2>Ayarlar</h2>
    <div class="panel-section">
      <div class="panel-label" style="opacity:0.5;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;">Renkler</div>
      <div class="panel-row">
        <span class="panel-label">Arka plan</span>
        <div class="color-input-wrap">
          <div class="color-swatch" id="swatchBg" style="background:#0a0a0a"></div>
          <input class="hex-input" id="hexBg" value="#0a0a0a" maxlength="7" placeholder="#000000">
        </div>
      </div>
      <div class="panel-row">
        <span class="panel-label">Sol yuvarlak</span>
        <div class="color-input-wrap">
          <div class="color-swatch" id="swatchLeft" style="background:#b0b0b0"></div>
          <input class="hex-input" id="hexLeft" value="#b0b0b0" maxlength="7" placeholder="#b0b0b0">
        </div>
      </div>
      <div class="panel-row">
        <span class="panel-label">Sağ yuvarlak</span>
        <div class="color-input-wrap">
          <div class="color-swatch" id="swatchRight" style="background:#3a3a3a"></div>
          <input class="hex-input" id="hexRight" value="#3a3a3a" maxlength="7" placeholder="#3a3a3a">
        </div>
      </div>
      <div class="panel-row">
        <span class="panel-label">Yazı rengi (sol)</span>
        <div class="color-input-wrap">
          <div class="color-swatch" id="swatchTextLight" style="background:#0a0a0a"></div>
          <input class="hex-input" id="hexTextLight" value="#0a0a0a" maxlength="7" placeholder="#0a0a0a">
        </div>
      </div>
      <div class="panel-row">
        <span class="panel-label">Yazı rengi (sağ)</span>
        <div class="color-input-wrap">
          <div class="color-swatch" id="swatchTextDark" style="background:#e0e0e0"></div>
          <input class="hex-input" id="hexTextDark" value="#e0e0e0" maxlength="7" placeholder="#e0e0e0">
        </div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="panel-section">
      <div class="panel-label" style="opacity:0.5;font-size:12px;letter-spacing:0.15em;text-transform:uppercase;">Görünüm</div>
      <div class="toggle-row panel-row">
        <span class="panel-label">Kesişim şeffaf</span>
        <button class="toggle" id="transparencyToggle"></button>
      </div>
    </div>
    <button class="close-panel-btn" id="closePanelBtn">Kapat</button>
  </div>
</div>

<!-- RATIO MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Süre Ayarı</h3>
    <div class="modal-row">
      <span class="modal-label">Çalışma (dk.)</span>
      <input class="num-input" id="workInput" type="number" min="1" max="240" value="80">
    </div>
    <div class="modal-row">
      <span class="modal-label">Mola (dk.)</span>
      <input class="num-input" id="breakInput" type="number" min="1" max="60" value="20">
    </div>
    <div class="modal-btns">
      <button class="modal-btn" id="modalCancel">İptal</button>
      <button class="modal-btn confirm" id="modalConfirm">Uygula</button>
    </div>
  </div>
</div>

<script>
  // ─── STATE ───────────────────────────────────────────────────────────────────
  let workMin = 80, breakMin = 20;
  let currentPhase = 'work';       // 'work' | 'break'
  let phaseDuration = workMin * 60; // total seconds for current phase
  let running = false;
  let ticker = null;
  let transparencyOn = false;

  // Elapsed-time tracking (key to background accuracy)
  let startTimestamp = null;   // Date.now() when timer last started
  let elapsedAtPause = 0;      // seconds already elapsed before last pause

  // ─── DOM ─────────────────────────────────────────────────────────────────────
  const minuteDisplay = document.getElementById('minuteDisplay');
  const secondDisplay = document.getElementById('secondDisplay');
  const statusDot     = document.getElementById('statusDot');
  const statusText    = document.getElementById('statusText');
  const startBtn      = document.getElementById('startBtn');
  const resetBtn      = document.getElementById('resetBtn');
  const ratioBtn      = document.getElementById('ratioBtn');

  const menuBtn            = document.getElementById('menuBtn');
  const panelOverlay       = document.getElementById('panelOverlay');
  const closePanelBtn      = document.getElementById('closePanelBtn');
  const modalOverlay       = document.getElementById('modalOverlay');
  const modalCancel        = document.getElementById('modalCancel');
  const modalConfirm       = document.getElementById('modalConfirm');
  const workInput          = document.getElementById('workInput');
  const breakInput         = document.getElementById('breakInput');
  const transparencyToggle = document.getElementById('transparencyToggle');

  // ─── HELPERS ─────────────────────────────────────────────────────────────────

  // How many seconds have elapsed in the current run (real-clock based)
  function getElapsed() {
    if (!running) return elapsedAtPause;
    return elapsedAtPause + Math.floor((Date.now() - startTimestamp) / 1000);
  }

  function getRemaining() {
    return Math.max(0, phaseDuration - getElapsed());
  }

  function updateDisplay() {
    const rem  = getRemaining();
    const mins = Math.floor(rem / 60);
    const secs = rem % 60;
    minuteDisplay.textContent = String(mins).padStart(2, '0');
    secondDisplay.textContent = String(secs).padStart(2, '0');
  }

  // ─── PHASE SWITCH ────────────────────────────────────────────────────────────
  function switchPhase() {
    running = false;
    clearInterval(ticker);
    startTimestamp = null;
    elapsedAtPause = 0;

    if (currentPhase === 'work') {
      currentPhase  = 'break';
      phaseDuration = breakMin * 60;
      statusDot.className  = 'status-dot break';
      statusText.textContent = 'Mola';
    } else {
      currentPhase  = 'work';
      phaseDuration = workMin * 60;
      statusDot.className  = 'status-dot';
      statusText.textContent = 'Çalışıyor';
    }
    updateDisplay();
    startBtn.textContent = 'Başlat';
    // Otomatik başlat: yorum satırını kaldırın isterseniz
    // startStop();
  }

  // ─── TICK ────────────────────────────────────────────────────────────────────
  function tick() {
    updateDisplay();
    if (getRemaining() <= 0) {
      clearInterval(ticker);
      running = false;
      // Küçük gecikme: son 00:00 ekranda görünsün
      setTimeout(switchPhase, 600);
    }
  }

  // ─── START / PAUSE ───────────────────────────────────────────────────────────
  function startStop() {
    if (running) {
      // PAUSE: kaydet ne kadar geçti
      elapsedAtPause = getElapsed();
      clearInterval(ticker);
      running = false;
      startBtn.textContent   = 'Devam';
      statusDot.className    = 'status-dot paused';
      statusText.textContent = 'Duraklatıldı';
    } else {
      // START / RESUME: gerçek saati kaydet
      startTimestamp = Date.now();
      running = true;
      ticker = setInterval(tick, 500); // 500ms: daha hızlı güncelleme, daha az gecikme
      startBtn.textContent = 'Duraklat';
      if (currentPhase === 'work') {
        statusDot.className    = 'status-dot';
        statusText.textContent = 'Çalışıyor';
      } else {
        statusDot.className    = 'status-dot break';
        statusText.textContent = 'Mola';
      }
    }
  }

  // ─── RESET ───────────────────────────────────────────────────────────────────
  function reset() {
    clearInterval(ticker);
    running = false;
    currentPhase   = 'work';
    phaseDuration  = workMin * 60;
    startTimestamp = null;
    elapsedAtPause = 0;
    updateDisplay();
    startBtn.textContent   = 'Başlat';
    statusDot.className    = 'status-dot paused';
    statusText.textContent = 'Hazır';
  }

  // ─── VİSİBİLİTY API: Sekme/ekran geri döndüğünde ekranı hemen güncelle ──────
  document.addEventListener('visibilitychange', () => {
    if (!document.hidden && running) {
      // Sayfaya geri dönüldüğünde kalan süreyi anında yansıt
      updateDisplay();
      // Eğer süre bitmişse faz geçişini tetikle
      if (getRemaining() <= 0) {
        clearInterval(ticker);
        running = false;
        setTimeout(switchPhase, 600);
      }
    }
  });

  // ─── RATIO MODAL ─────────────────────────────────────────────────────────────
  ratioBtn.addEventListener('click', () => {
    workInput.value  = workMin;
    breakInput.value = breakMin;
    modalOverlay.classList.add('open');
  });
  modalCancel.addEventListener('click', () => modalOverlay.classList.remove('open'));
  modalOverlay.addEventListener('click', e => {
    if (e.target === modalOverlay) modalOverlay.classList.remove('open');
  });
  modalConfirm.addEventListener('click', () => {
    const w = parseInt(workInput.value)  || 80;
    const b = parseInt(breakInput.value) || 20;
    workMin  = Math.max(1, Math.min(240, w));
    breakMin = Math.max(1, Math.min(60,  b));
    ratioBtn.textContent = `${workMin}/${breakMin}`;
    modalOverlay.classList.remove('open');
    reset();
  });

  // ─── SETTINGS PANEL ──────────────────────────────────────────────────────────
  menuBtn.addEventListener('click',       () => panelOverlay.classList.add('open'));
  closePanelBtn.addEventListener('click', () => panelOverlay.classList.remove('open'));
  panelOverlay.addEventListener('click',  e => {
    if (e.target === panelOverlay) panelOverlay.classList.remove('open');
  });

  function bindColor(hexId, swatchId, cssVar) {
    const hexEl    = document.getElementById(hexId);
    const swatchEl = document.getElementById(swatchId);
    hexEl.addEventListener('input', () => {
      const val = hexEl.value.trim();
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        document.documentElement.style.setProperty(cssVar, val);
        swatchEl.style.background = val;
      }
    });
    hexEl.addEventListener('blur', () => {
      let val = hexEl.value.trim();
      if (!val.startsWith('#')) val = '#' + val;
      if (/^#[0-9a-fA-F]{6}$/.test(val)) {
        hexEl.value = val;
        document.documentElement.style.setProperty(cssVar, val);
        swatchEl.style.background = val;
      }
    });
    swatchEl.addEventListener('click', () => hexEl.focus());
  }

  bindColor('hexBg',        'swatchBg',        '--bg');
  bindColor('hexLeft',      'swatchLeft',       '--circle-left');
  bindColor('hexRight',     'swatchRight',      '--circle-right');
  bindColor('hexTextLight', 'swatchTextLight',  '--text-on-light');
  bindColor('hexTextDark',  'swatchTextDark',   '--text-on-dark');

  transparencyToggle.addEventListener('click', () => {
    transparencyOn = !transparencyOn;
    transparencyToggle.classList.toggle('on', transparencyOn);
    const left  = document.getElementById('circleLeft');
    const right = document.getElementById('circleRight');
    if (transparencyOn) {
      left.style.mixBlendMode  = 'screen';
      right.style.mixBlendMode = 'screen';
      left.style.opacity  = '0.88';
      right.style.opacity = '0.88';
    } else {
      left.style.mixBlendMode  = '';
      right.style.mixBlendMode = '';
      left.style.opacity  = '1';
      right.style.opacity = '1';
    }
  });

  // ─── BUTTON LISTENERS ────────────────────────────────────────────────────────
  startBtn.addEventListener('click', startStop);
  resetBtn.addEventListener('click', reset);

  // ─── INIT ────────────────────────────────────────────────────────────────────
  updateDisplay();
</script>
</body>
</html>
